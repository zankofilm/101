<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>کلاینت سامانه سمن‌های شهرستان جوانرود V101</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;min-height:100%;font-family:Tahoma,Arial,sans-serif;background:#f7fbff;color:#0e2f57}body{overflow-x:hidden}
button,input,select,textarea{font-family:Tahoma,Arial,sans-serif}button{cursor:pointer}
.app{min-height:100vh;background:radial-gradient(circle at 10% 0,#dff2ff,transparent 32%),linear-gradient(135deg,#f7fbff,#eef7ff)}
.header{padding:18px 16px;background:linear-gradient(135deg,#082b55,#0d5d8f 65%,#0e7a54);color:white;border-bottom-left-radius:28px;border-bottom-right-radius:28px;box-shadow:0 18px 44px rgba(8,43,85,.22)}
.header h1{font-size:18px;margin:0 0 6px}.header p{margin:0;color:#dbeafe;font-size:12px;line-height:1.8}
.panel{padding:14px;max-width:980px;margin:0 auto}.card{background:white;border:1px solid #dbe8f7;border-radius:22px;padding:16px;margin:12px 0;box-shadow:0 12px 30px rgba(14,47,87,.08)}
.card h2,.card h3{margin:0 0 12px;color:#0e2f57}.field{margin:10px 0}.field label{display:block;font-size:12px;color:#475467;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;border:1px solid #d5e6f7;border-radius:14px;padding:11px;background:white;outline:none}.field textarea{min-height:80px;resize:vertical}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{border:1px solid #dbe8f7;background:white;color:#0e2f57;border-radius:14px;padding:10px 13px;font-weight:800}.btn.primary{background:#1f5fbd;color:white;border-color:#1f5fbd}.btn.green{background:#079455;color:white;border-color:#079455}.btn.danger{background:#d92d20;color:white;border-color:#d92d20}.btn.small{padding:7px 9px;font-size:12px}
.tabs{display:flex;gap:8px;overflow:auto;padding:10px 0}.tab{white-space:nowrap;border:1px solid #dbe8f7;background:white;border-radius:14px;padding:9px 11px;color:#0e2f57;font-weight:800}.tab.active{background:#1f5fbd;color:white;border-color:#1f5fbd}
.notice{border-radius:16px;padding:12px;line-height:1.9;margin:10px 0;border:1px solid}.notice.ok{background:#ecfdf3;color:#027a48;border-color:#abefc6}.notice.warn{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.notice.info{background:#eef6ff;color:#1f5fbd;border-color:#cfe4ff}.notice.bad{background:#fef3f2;color:#b42318;border-color:#fecdca}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.tile{background:#f8fbff;border:1px solid #e1edf9;border-radius:18px;padding:13px}.tile b{display:block;margin-bottom:8px;color:#0e2f57}
.tablewrap{overflow:auto;border:1px solid #e1edf9;border-radius:18px}table{width:100%;border-collapse:collapse;background:white}th,td{padding:10px;border-bottom:1px solid #edf3f9;text-align:right;font-size:13px}th{background:#f8fbff;color:#0e2f57}
.preview{max-width:100%;max-height:340px;object-fit:contain;border:1px solid #dbe8f7;border-radius:16px;background:white;padding:6px;margin-top:8px}.thumb{width:82px;height:62px;object-fit:contain;border:1px solid #dbe8f7;border-radius:10px;background:white}
.fileLabel{display:inline-block;border:1px solid #dbe8f7;background:white;border-radius:14px;padding:10px 13px;font-weight:800;color:#0e2f57}
.hidden{display:none!important}
@media(max-width:720px){.grid{grid-template-columns:1fr}.panel{padding:10px}.header{border-bottom-left-radius:22px;border-bottom-right-radius:22px}.actions .btn,.fileLabel{width:100%;text-align:center}}
</style>
</head>
<body>
<div id="root" class="app"></div>
<script>
(function(){
const KEY='jvn_client_v101_native_state';
const months=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
let state={activation:null,session:null,organization:{},members:[],accounts:[],beneficiaries:[],reports:[],licenses:[],documents:[],exports:[],errors:[]};
try{state=Object.assign(state,JSON.parse(localStorage.getItem(KEY)||'{}'))}catch(e){}

function $(id){return document.getElementById(id)}
function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function uid(p='id'){return p+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7)}
function now(){try{return new Date().toLocaleString('fa-IR')}catch(e){return new Date().toISOString()}}
function today(){try{return new Date().toLocaleDateString('fa-IR')}catch(e){return new Date().toISOString().slice(0,10)}}
function num(v){return Number(String(v||'').replace(/[^\d.-]/g,''))||0}
function money(v){return String(num(v)).replace(/\B(?=(\d{3})+(?!\d))/g,',')+' ریال'}
function save(){localStorage.setItem(KEY,JSON.stringify(state));try{if(window.JavanroodNativeStore)window.JavanroodNativeStore.saveState('client',state)}catch(e){}}
function dl(name,text,type='application/json;charset=utf-8'){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),900)}
function downloadJSON(name,obj){dl(name,JSON.stringify(obj,null,2))}
window.addEventListener('error',e=>{try{state.errors.unshift({at:now(),msg:e.message,src:e.filename,line:e.lineno});state.errors=state.errors.slice(0,50);save();showError(e.message)}catch(x){}});
window.addEventListener('unhandledrejection',e=>{try{let m=(e.reason&&e.reason.message)||String(e.reason);state.errors.unshift({at:now(),msg:m});save();showError(m)}catch(x){}});
function showError(msg){let r=$('root');if(r)r.innerHTML=layout(`<div class="card"><h2>خطا در اجرای کلاینت</h2><div class="notice bad">${esc(msg)}</div><div class="actions"><button class="btn primary" onclick="location.reload()">بارگذاری دوباره</button><button class="btn danger" onclick="resetAll()">ریست اطلاعات کلاینت</button></div></div>`)}

function layout(body){return `<div class="header"><h1>کلاینت سامانه سمن‌های شهرستان جوانرود</h1><p>نسخه Native بدون پورت V101، با صفحه امن ضد سفید شدن</p></div><div class="panel">${body}</div>`}

window.resetAll=function(){if(confirm('همه اطلاعات ذخیره‌شده کلاینت پاک شود؟')){localStorage.removeItem(KEY);location.reload()}}
window.openOldClient=function(){location.href='index_full_original.html'}

function activationPage(){
 $('root').innerHTML=layout(`<div class="card"><h2>فعال‌سازی کلاینت</h2><div class="notice info">فایل فعال‌سازی را انتخاب کن. اگر فعلاً فایل نداری، می‌توانی ورود آزمایشی بزنی تا صفحه سفید نماند.</div><div class="field"><label>فایل فعال‌سازی JSON/LIC</label><input id="actFile" type="file" accept=".json,.lic,application/json"></div><div class="field"><label>کد ملی مدیرعامل</label><input id="actNid" placeholder="کد ملی مدیرعامل"></div><div class="actions"><button class="btn primary" onclick="activateClient()">فعال‌سازی</button><button class="btn" onclick="demoActivation()">ورود آزمایشی</button><button class="btn" onclick="openOldClient()">باز کردن کلاینت کامل قبلی</button></div></div>`);
}
window.demoActivation=function(){state.activation={organizationName:'سمن نمونه جوانرود',ceoName:'مدیرعامل نمونه',ceoNationalId:'0000000000'};state.session={user:'client',fullName:'کاربر کلاینت'};state.organization.organizationName='سمن نمونه جوانرود';state.organization.ceoName='مدیرعامل نمونه';save();dashboard()}
window.activateClient=function(){
 let f=$('actFile').files[0]; let nid=($('actNid').value||'').trim();
 if(!f)return alert('فایل فعال‌سازی را انتخاب کن.');
 let r=new FileReader();
 r.onload=()=>{try{let data=JSON.parse(r.result);state.activation=data;state.session={user:'client',fullName:data.ceoName||data.ceoFullName||'کاربر کلاینت'};state.organization.organizationName=data.organizationName||data.orgName||'';state.organization.ceoName=data.ceoName||data.ceoFullName||'';state.organization.ceoNationalId=nid||data.ceoNationalId||'';save();dashboard()}catch(e){alert('فایل فعال‌سازی معتبر نیست: '+e.message)}};
 r.readAsText(f);
}

function tabs(active){
 return `<div class="tabs">${[['home','داشبورد'],['org','اطلاعات سمن'],['members','هیأت مدیره'],['licenses','مجوزها'],['docs','مدارک/اسکن'],['accounts','حساب‌ها'],['beneficiaries','مددجوها'],['reports','گزارش مالی'],['export','خروجی ادمین'],['settings','تنظیمات']].map(x=>`<button class="tab ${active===x[0]?'active':''}" onclick="dashboard('${x[0]}')">${x[1]}</button>`).join('')}</div>`}
window.dashboard=function(tab='home'){if(!state.session)return activationPage();let body=tab==='org'?orgPanel():tab==='members'?membersPanel():tab==='licenses'?licensesPanel():tab==='docs'?docsPanel():tab==='accounts'?accountsPanel():tab==='beneficiaries'?benPanel():tab==='reports'?reportsPanel():tab==='export'?exportPanel():tab==='settings'?settingsPanel():homePanel();$('root').innerHTML=layout(`<div class="card"><div class="actions"><button class="btn small" onclick="logout()">خروج</button><button class="btn small" onclick="openOldClient()">کلاینت کامل قبلی</button></div>${tabs(tab)}${body}</div>`)}
window.logout=function(){state.session=null;save();activationPage()}

function completion(){let t=8,o=0;if(state.organization.organizationName)o++;if(state.organization.ceoName)o++;if(state.members.length)o++;if(state.licenses.length)o++;if(state.licenses.some(x=>x.imageData))o++;if(state.documents.length)o++;if(state.accounts.length)o++;if(state.reports.length)o++;return Math.round(o/t*100)}
function homePanel(){return `<h2>داشبورد کلاینت</h2><div class="notice ok">درصد تکمیل پرونده: ${completion()}٪</div><div class="grid"><div class="tile"><b>نام سمن</b>${esc(state.organization.organizationName)}</div><div class="tile"><b>مدیرعامل</b>${esc(state.organization.ceoName)}</div><div class="tile"><b>هیأت مدیره</b>${state.members.length} نفر</div><div class="tile"><b>مجوزها</b>${state.licenses.length} رکورد</div><div class="tile"><b>مدارک اسکن‌شده</b>${state.documents.length} مدرک</div><div class="tile"><b>گزارش مالی</b>${state.reports.length} گزارش</div></div>`}
function orgPanel(){let o=state.organization;return `<h2>اطلاعات سمن</h2><div class="grid"><div class="field"><label>نام سمن</label><input id="orgName" value="${esc(o.organizationName)}"></div><div class="field"><label>شناسه ملی</label><input id="orgNid" value="${esc(o.organizationNationalId)}"></div><div class="field"><label>شماره ثبت</label><input id="orgReg" value="${esc(o.regNo)}"></div><div class="field"><label>حوزه فعالیت</label><input id="orgAct" value="${esc(o.activity)}"></div><div class="field"><label>مدیرعامل</label><input id="orgCeo" value="${esc(o.ceoName)}"></div><div class="field"><label>کد ملی مدیرعامل</label><input id="orgCeoId" value="${esc(o.ceoNationalId)}"></div></div><div class="field"><label>آدرس</label><textarea id="orgAddr">${esc(o.address)}</textarea></div><div class="actions"><button class="btn primary" onclick="saveOrg()">ذخیره</button></div>`}
window.saveOrg=function(){Object.assign(state.organization,{organizationName:$('orgName').value,organizationNationalId:$('orgNid').value,regNo:$('orgReg').value,activity:$('orgAct').value,ceoName:$('orgCeo').value,ceoNationalId:$('orgCeoId').value,address:$('orgAddr').value});save();dashboard('org')}

function membersPanel(){return `<h2>هیأت مدیره</h2><div class="grid"><div class="field"><label>نام</label><input id="mName"></div><div class="field"><label>کد ملی</label><input id="mNid"></div><div class="field"><label>سمت</label><select id="mRole"><option>مدیرعامل</option><option>رئیس هیأت مدیره</option><option>عضو هیأت مدیره</option><option>بازرس</option></select></div></div><button class="btn primary" onclick="addMember()">افزودن</button>${table(['نام','کد ملی','سمت'],state.members.map(x=>[x.name,x.nationalId,x.role]))}`}
window.addMember=function(){state.members.push({id:uid('m'),name:$('mName').value,nationalId:$('mNid').value,role:$('mRole').value});save();dashboard('members')}

function licensesPanel(){return `<h2>مجوزها</h2><div class="grid"><div class="field"><label>شماره مجوز</label><input id="lNo"></div><div class="field"><label>وضعیت</label><select id="lStatus"><option>معتبر</option><option>نزدیک انقضا</option><option>منقضی</option></select></div><div class="field"><label>شروع</label><input id="lStart"></div><div class="field"><label>پایان</label><input id="lEnd"></div></div><div class="actions"><label class="fileLabel">انتخاب از دوربین/گالری<input class="hidden" id="lImg" type="file" accept="image/*,.jpg,.png,.webp" capture="environment" onchange="previewFile(this,'licPrev')"></label><button class="btn primary" onclick="addLicense()">ذخیره مجوز</button></div><div id="licPrev"></div><div class="tablewrap"><table><tr><th>شماره</th><th>وضعیت</th><th>عکس</th></tr>${state.licenses.map(l=>`<tr><td>${esc(l.no)}</td><td>${esc(l.status)}</td><td>${l.imageData?`<img class="thumb" src="${l.imageData}">`:'ندارد'}</td></tr>`).join('')||'<tr><td colspan="3">مجوزی ثبت نشده است.</td></tr>'}</table></div>`}
window.previewFile=function(input,boxId){let f=input.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{$(boxId).innerHTML=`<img class="preview" src="${r.result}">`;input.dataset.data=r.result};r.readAsDataURL(f)}
window.addLicense=function(){let img=$('lImg').dataset.data||'';state.licenses.push({id:uid('lic'),no:$('lNo').value,status:$('lStatus').value,start:$('lStart').value,end:$('lEnd').value,imageData:img,createdAt:now()});save();dashboard('licenses')}

function docsPanel(){return `<h2>مدارک/اسکن</h2><div class="grid"><div class="field"><label>نوع مدرک</label><select id="dType"><option>مجوز فعالیت</option><option>اساسنامه</option><option>آگهی ثبت</option><option>مدارک مدیرعامل</option><option>مدارک هیأت مدیره</option><option>مدارک حساب بانکی</option><option>گزارش مالی</option><option>سایر مدارک</option></select></div><div class="field"><label>عنوان</label><input id="dTitle"></div></div><div class="field"><label>توضیح</label><textarea id="dDesc"></textarea></div><div class="actions"><label class="fileLabel">اسکن/انتخاب مدرک<input class="hidden" id="dImg" type="file" accept="image/*,.pdf" capture="environment" onchange="previewFile(this,'docPrev')"></label><button class="btn primary" onclick="addDoc()">ذخیره مدرک</button></div><div id="docPrev"></div><div class="tablewrap"><table><tr><th>نوع</th><th>عنوان</th><th>تصویر</th></tr>${state.documents.map(d=>`<tr><td>${esc(d.type)}</td><td>${esc(d.title)}</td><td>${d.imageData?`<img class="thumb" src="${d.imageData}">`:esc(d.fileName||'')}</td></tr>`).join('')||'<tr><td colspan="3">مدرکی ثبت نشده است.</td></tr>'}</table></div>`}
window.addDoc=function(){let f=$('dImg').files[0];state.documents.unshift({id:uid('doc'),type:$('dType').value,title:$('dTitle').value,desc:$('dDesc').value,imageData:$('dImg').dataset.data||'',fileName:f?f.name:'',createdAt:now()});save();dashboard('docs')}

function accountsPanel(){return `<h2>حساب‌ها</h2><div class="grid"><div class="field"><label>بانک</label><input id="aBank"></div><div class="field"><label>شماره حساب</label><input id="aNo"></div><div class="field"><label>شبا</label><input id="aSheba"></div></div><button class="btn primary" onclick="addAcc()">افزودن</button>${table(['بانک','شماره حساب','شبا'],state.accounts.map(x=>[x.bank,x.no,x.sheba]))}`}
window.addAcc=function(){state.accounts.push({id:uid('acc'),bank:$('aBank').value,no:$('aNo').value,sheba:$('aSheba').value});save();dashboard('accounts')}

function benPanel(){return `<h2>مددجوها</h2><div class="grid"><div class="field"><label>نام</label><input id="bName"></div><div class="field"><label>کد ملی</label><input id="bNid"></div><div class="field"><label>مبلغ</label><input id="bAmount"></div></div><button class="btn primary" onclick="addBen()">افزودن</button>${table(['نام','کد ملی','مبلغ'],state.beneficiaries.map(x=>[x.name,x.nationalId,money(x.amount)]))}`}
window.addBen=function(){state.beneficiaries.push({id:uid('ben'),name:$('bName').value,nationalId:$('bNid').value,amount:num($('bAmount').value)});save();dashboard('beneficiaries')}

function reportsPanel(){return `<h2>گزارش مالی</h2><div class="grid"><div class="field"><label>سال</label><input id="rYear"></div><div class="field"><label>ماه</label><select id="rMonth">${months.map(m=>`<option>${m}</option>`).join('')}</select></div><div class="field"><label>کل واریزی</label><input id="rIncome"></div><div class="field"><label>کل هزینه</label><input id="rExpense"></div><div class="field"><label>پرداخت مددجو</label><input id="rBenPay"></div><div class="field"><label>هزینه جاری</label><input id="rCur"></div></div><button class="btn primary" onclick="addReport()">ثبت گزارش</button>${table(['سال','ماه','واریزی','هزینه','مانده'],state.reports.map(r=>[r.year,r.month,money(r.income),money(r.expense),money(num(r.income)-num(r.expense))]))}`}
window.addReport=function(){state.reports.push({id:uid('rep'),year:$('rYear').value,month:$('rMonth').value,income:num($('rIncome').value),expense:num($('rExpense').value),beneficiaryPay:num($('rBenPay').value),currentCost:num($('rCur').value),status:'ثبت شده'});save();dashboard('reports')}

function exportPanel(){return `<h2>خروجی برای ادمین</h2><div class="notice info">این خروجی شامل اطلاعات سمن، هیأت مدیره، مجوزها، عکس مجوز، مدارک، حساب‌ها، مددجوها و گزارش‌های مالی است.</div><button class="btn green" onclick="makeExport()">ساخت خروجی JSON</button><button class="btn" onclick="backup()">بکاپ کلاینت</button>${table(['کد','تاریخ'],state.exports.map(x=>[x.code,x.at]))}`}
window.makeExport=function(){let code='JVN-CLIENT-'+Date.now();let data={type:'JAVANROOD_NGO_CLIENT_EXPORT',version:'101-native-safe',trackingCode:code,exportedAt:now(),organization:state.organization,members:state.members,licenses:state.licenses,documents:state.documents,accounts:state.accounts,beneficiaries:state.beneficiaries,reports:state.reports};state.exports.unshift({code,at:data.exportedAt});save();downloadJSON('client_export_'+code+'.json',data);dashboard('export')}
window.backup=function(){downloadJSON('client_backup_v101.json',state)}

function settingsPanel(){return `<h2>تنظیمات</h2><div class="notice warn">اگر صفحه سفید شد یا داده خراب شد، از ریست استفاده کن.</div><div class="actions"><button class="btn" onclick="backup()">دریافت بکاپ</button><button class="btn danger" onclick="resetAll()">ریست کامل</button><button class="btn" onclick="openOldClient()">باز کردن نسخه کامل قبلی</button></div>${state.errors.length?table(['زمان','خطا'],state.errors.map(e=>[e.at,e.msg])):''}`}

function table(head,rows){return `<div class="tablewrap"><table><tr>${head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')||`<tr><td colspan="${head.length}">رکوردی ثبت نشده است.</td></tr>`}</table></div>`}

async function nativeLoad(){
 try{if(window.JavanroodNativeStore){let r=await window.JavanroodNativeStore.loadState('client');if(r&&r.exists&&r.state&&!localStorage.getItem(KEY)){state=Object.assign(state,r.state);localStorage.setItem(KEY,JSON.stringify(state));}}}catch(e){}
 if(state.session)dashboard('home');else activationPage();
}
nativeLoad();
})();
</script>
</body></html>
